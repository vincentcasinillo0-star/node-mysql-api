<h3>Update Profile</h3>
<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form-group mb-3">
    <label>Title</label>
    <select formControlName="title" class="form-select" [ngClass]="{ 'is-invalid': submitted && f['title'].errors }">
      <option value="">Title...</option>
      <option value="Mr">Mr</option>
      <option value="Mrs">Mrs</option>
      <option value="Miss">Miss</option>
      <option value="Ms">Ms</option>
    </select>
    <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">
      <div *ngIf="f['title'].errors['required']">Title is required</div>
    </div>
  </div>
  <div class="form-group mb-3">
    <label>First Name</label>
    <input type="text" formControlName="firstName" class="form-control"
      [ngClass]="{ 'is-invalid': submitted && f['firstName'].errors }" />
    <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback">
      <div *ngIf="f['firstName'].errors['required']">First Name is required</div>
    </div>
  </div>
  <div class="form-group mb-3">
    <label>Last Name</label>
    <input type="text" formControlName="lastName" class="form-control"
      [ngClass]="{ 'is-invalid': submitted && f['lastName'].errors }" />
    <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback">
      <div *ngIf="f['lastName'].errors['required']">Last Name is required</div>
    </div>
  </div>
  <div class="form-group mb-3">
    <label>Email</label>
    <input type="email" formControlName="email" class="form-control"
      [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" />
    <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
      <div *ngIf="f['email'].errors['required']">Email is required</div>
      <div *ngIf="f['email'].errors['email']">Email must be a valid email address</div>
    </div>
  </div>
  <h3 class="mt-3">Change Password <span class="text-muted fs-6">(Leave blank to keep the same)</span></h3>
  <div class="form-group mb-3">
    <label>Password</label>
    <input type="password" formControlName="password" class="form-control"
      [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" />
    <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
      <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
    </div>
  </div>
  <div class="form-group mb-3">
    <label>Confirm Password</label>
    <input type="password" formControlName="confirmPassword" class="form-control"
      [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }" />
    <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
      <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
    </div>
  </div>
  <div class="d-flex gap-2">
    <button [disabled]="loading" class="btn btn-primary">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
      Update
    </button>
    <button type="button" (click)="onDelete()" [disabled]="deleting" class="btn btn-danger ms-auto">
      <span *ngIf="deleting" class="spinner-border spinner-border-sm me-1"></span>
      Delete Account
    </button>
  </div>
  <div *ngIf="error" class="alert alert-danger mt-3 mb-0">{{error}}</div>
</form>

<div [ngSwitch]="tokenStatus">
  <div *ngSwitchCase="TokenStatus.Validating">
    <div class="text-center">
      <span class="spinner-border spinner-border-lg align-center"></span>
      <p>Validating token...</p>
    </div>
  </div>
  <div *ngSwitchCase="TokenStatus.Valid">
    <div class="text-center">
      <h1 class="h4 text-gray-900 mb-4">Reset Password</h1>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group mb-3">
        <input type="password" formControlName="password" class="form-control" placeholder="New Password"
          [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>
      <div class="form-group mb-3">
        <input type="password" formControlName="confirmPassword" class="form-control" placeholder="Confirm New Password"
          [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }" />
        <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
          <div *ngIf="f['confirmPassword'].errors['required']">Confirm Password is required</div>
          <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
        </div>
      </div>
      <button [disabled]="loading" class="btn btn-primary w-100">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
        Reset Password
      </button>
      <div *ngIf="error" class="alert alert-danger mt-3 mb-0">{{error}}</div>
    </form>
  </div>
  <div *ngSwitchCase="TokenStatus.Invalid">
    <div class="alert alert-danger">
      Token validation failed, if the token has expired you can get a new one at the <a routerLink="/account/forgot-password">forgot password</a> page.
    </div>
  </div>
</div>
